name: CI

# Build native libraries (.so) for all supported ABIs using ndk-build directly.

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build native libraries
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and NDK
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "ndk;28.2.13676358"

      - name: Build native libraries with ndk-build
        id: build
        run: |
          set -e
          NDK_PATH=/usr/local/lib/android/sdk/ndk/28.2.13676358
          TINYWRAPPER_DIR=ltw/src/main/tinywrapper
          "$NDK_PATH/ndk-build" \
            NDK_PROJECT_PATH=null \
            NDK_OUT="$TINYWRAPPER_DIR/obj" \
            NDK_LIBS_OUT="$TINYWRAPPER_DIR/libs" \
            APP_BUILD_SCRIPT="$TINYWRAPPER_DIR/Android.mk" \
            NDK_APPLICATION_MK="$TINYWRAPPER_DIR/Application.mk" \
            APP_ABI="armeabi-v7a arm64-v8a x86 x86_64" \
            APP_PLATFORM=android-21 \
            -j$(nproc) 2>&1 | tee ltw/ltw.log

      - name: Verify built .so files
        run: |
          set -e
          LIBS_DIR=ltw/src/main/tinywrapper/libs
          echo "=== Build log tail ==="
          tail -100 ltw/ltw.log
          echo
          echo "=== LIBS_DIR exists? ==="
          ls -la "$LIBS_DIR" 2>/dev/null || echo "LIBS_DIR does not exist"
          echo
          echo "=== List contents of ABI dirs ==="
          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            echo "--- $abi ---"
            ls -la "$LIBS_DIR/$abi" 2>/dev/null || echo "Empty or missing"
          done
          echo
          echo "=== Find all .so files in project ==="
          find . -name '*.so' -type f 2>/dev/null | head -20
          echo
          echo "=== Per-ABI check ==="
          missing=0
          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            if [ -f "$LIBS_DIR/$abi/libsr.so" ]; then
              SIZE=$(stat -c%s "$LIBS_DIR/$abi/libsr.so")
              echo "  OK   $abi ($SIZE bytes)"
            else
              echo "::error::Missing libsr.so for ABI $abi"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Upload native libraries (.so)
        uses: actions/upload-artifact@v4
        with:
          name: ltw-native-libs
          path: ltw/src/main/tinywrapper/libs/
          if-no-files-found: error
          retention-days: 30

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ltw-build-logs
          path: ltw/ltw.log
          if-no-files-found: ignore
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Download native libraries (.so)
        uses: actions/download-artifact@v4
        with:
          name: ltw-native-libs
          path: native-libs

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            native-libs/*/libsr.so
          generate_release_notes: true
          fail_on_unmatched_files: true
