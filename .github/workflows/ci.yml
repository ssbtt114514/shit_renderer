name: CI

# Comprehensive build, verification and release pipeline for shit renderer (LTW).
# Builds the native AAR for all supported ABIs, verifies the artifact, and publishes
# a GitHub Release when a version tag (v*) is pushed.

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref. Keep branch runs to completion.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build & verify AAR
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Pre-install the platform + NDK pinned by the Gradle build. If the exact NDK
      # revision is unavailable in the repository, AGP will still install it on demand.
      - name: Install Android platform and NDK
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "ndk;28.2.13676358" || \
            echo "::warning::Could not pre-install NDK; AGP will install it on demand."

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release AAR
        run: ./gradlew :ltw:assembleRelease --no-daemon --stacktrace

      # Verification: ensure the AAR exists, is non-trivial in size, and contains the
      # expected native libraries for every target ABI.
      - name: Verify AAR artifact
        run: |
          set -e
          AAR="ltw/build/outputs/aar/ltw-release.aar"
          if [ ! -f "$AAR" ]; then
            echo "::error::AAR was not produced at $AAR"
            exit 1
          fi
          SIZE=$(stat -c%s "$AAR")
          if [ "$SIZE" -lt 1000 ]; then
            echo "::error::AAR is suspiciously small ($SIZE bytes); native build likely failed."
            exit 1
          fi
          echo "AAR produced: $AAR ($SIZE bytes)"
          echo
          echo "=== AAR contents ==="
          unzip -l "$AAR"
          echo
          echo "=== Native libraries per ABI ==="
          # AGP places native libs under jni/<abi>/ in the AAR (older layouts used lib/<abi>/).
          # Accept either prefix so the check survives future AGP layout changes.
          unzip -Z -1 "$AAR" | grep -E '(jni|lib)/[^/]+/libltw\.so' | sort || \
            { echo "::error::No libltw.so native libraries found in AAR"; exit 1; }
          echo
          echo "=== Per-ABI presence check ==="
          missing=0
          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            if unzip -Z -1 "$AAR" | grep -Fxq "jni/${abi}/libltw.so" || \
               unzip -Z -1 "$AAR" | grep -Fxq "lib/${abi}/libltw.so"; then
              echo "  OK   $abi"
            else
              echo "::error::Missing libltw.so for ABI $abi"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::One or more expected ABIs are missing from the AAR."
            exit 1
          fi

      # Extract the per-ABI .so files from the AAR so they can be consumed directly
      # without unpacking the AAR manually.
      - name: Extract native libraries (.so)
        run: |
          set -e
          AAR="ltw/build/outputs/aar/ltw-release.aar"
          OUT="ltw/build/outputs/native-libs"
          rm -rf "$OUT"
          mkdir -p "$OUT"
          missing=0
          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            mkdir -p "$OUT/$abi"
            if unzip -p "$AAR" "jni/$abi/libltw.so" > "$OUT/$abi/libltw.so" 2>/dev/null && \
               [ -s "$OUT/$abi/libltw.so" ]; then
              :
            elif unzip -p "$AAR" "lib/$abi/libltw.so" > "$OUT/$abi/libltw.so" 2>/dev/null && \
                 [ -s "$OUT/$abi/libltw.so" ]; then
              :
            else
              echo "::error::Could not extract libltw.so for ABI $abi"
              missing=1
            fi
            ls -lh "$OUT/$abi/libltw.so"
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::One or more .so files could not be extracted from the AAR."
            exit 1
          fi
          echo
          echo "=== Extracted .so files ==="
          find "$OUT" -name 'libltw.so' -exec ls -lh {} \;

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ltw-release-aar
          path: ltw/build/outputs/aar/ltw-release.aar
          if-no-files-found: error
          retention-days: 30

      - name: Upload native libraries (.so)
        uses: actions/upload-artifact@v4
        with:
          name: ltw-native-libs
          path: ltw/build/outputs/native-libs/
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Download AAR artifact
        uses: actions/download-artifact@v4
        with:
          name: ltw-release-aar
          path: artifacts

      - name: Download native libraries (.so)
        uses: actions/download-artifact@v4
        with:
          name: ltw-native-libs
          path: native-libs

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ltw-release.aar
            native-libs/*/libltw.so
          generate_release_notes: true
          fail_on_unmatched_files: true
